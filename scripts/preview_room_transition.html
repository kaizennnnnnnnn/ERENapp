<!doctype html>
<!-- Mirrors the CareSceneHost room-swipe overlays (depth veil + sparkle
     curtain + depth slide-in) so the CSS can be eyeballed without auth.
     Keep the keyframes/markup in sync with CareSceneHost.tsx. -->
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #222; display: flex; gap: 20px; padding: 20px; font-family: monospace; }
  .stage { position: relative; width: 390px; height: 844px; overflow: hidden; background: #000; flex-shrink: 0; }
  .container { position: absolute; inset: 0; }
  .room { position: absolute; inset: 0; background-size: cover; background-position: center; }
  .veil { position: absolute; inset: 0; background: #0B0414; z-index: 41; pointer-events: none; }
  .curtain { position: absolute; top: 0; bottom: 0; width: 130px; z-index: 45; pointer-events: none; }
  .curtain .grad { position: absolute; inset: 0; }
  .spark { position: absolute; }

  @keyframes slideInRight {
    from { transform: translateX(100%) scale(0.92); }
    to   { transform: translateX(0)    scale(1);    }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-100%) scale(0.92); }
    to   { transform: translateX(0)     scale(1);    }
  }
  @keyframes roomArriveDim { from { opacity: 0.55; } to { opacity: 0; } }
  @keyframes roomCurtain { 0% { opacity: 0; } 35% { opacity: 1; } 100% { opacity: 0; } }
  @keyframes roomTwinkle {
    0%, 100% { opacity: 1;    transform: scale(1);   }
    50%      { opacity: 0.25; transform: scale(0.6); }
  }
</style>
</head>
<body>
<div class="stage" id="stage"></div>

<script>
const ROOM_SPARKS = [
  { x: 50, y: 7,  s: 6, c: '#FFE9F4', d: 1.6, delay: 0    },
  { x: 28, y: 15, s: 4, c: '#F9A8D4', d: 1.2, delay: 0.3  },
  { x: 70, y: 23, s: 5, c: '#C4B5FD', d: 1.8, delay: 0.7  },
  { x: 44, y: 32, s: 4, c: '#F5C842', d: 1.4, delay: 0.2  },
  { x: 60, y: 41, s: 7, c: '#FFFFFF', d: 2.0, delay: 0.5  },
  { x: 24, y: 50, s: 4, c: '#F9A8D4', d: 1.3, delay: 0.9  },
  { x: 72, y: 59, s: 5, c: '#C4B5FD', d: 1.7, delay: 0.1  },
  { x: 46, y: 67, s: 6, c: '#FFE9F4', d: 1.5, delay: 0.6  },
  { x: 32, y: 76, s: 4, c: '#F5C842', d: 1.9, delay: 0.4  },
  { x: 64, y: 84, s: 5, c: '#FFFFFF', d: 1.4, delay: 0.8  },
  { x: 50, y: 93, s: 4, c: '#F9A8D4', d: 1.6, delay: 0.25 },
]

function gradFor(side) {
  return side === 'left'
    ? 'linear-gradient(90deg, transparent, rgba(244,114,182,0.18) 40%, rgba(255,255,255,0.22) 55%, rgba(167,139,250,0.16) 70%, transparent)'
    : 'linear-gradient(90deg, transparent, rgba(167,139,250,0.16) 30%, rgba(255,255,255,0.22) 45%, rgba(244,114,182,0.18) 60%, transparent)'
}

function curtainEl(side, style) {
  const c = document.createElement('div')
  c.className = 'curtain'
  if (side === 'left') c.style.left = '0'; else c.style.right = '0'
  c.style.transform = `translateX(${side === 'left' ? '-50%' : '50%'})`
  Object.assign(c.style, style)
  const g = document.createElement('div')
  g.className = 'grad'; g.style.background = gradFor(side)
  c.appendChild(g)
  for (const sp of ROOM_SPARKS) {
    const d = document.createElement('div')
    d.className = 'spark'
    d.style.left = sp.x + '%'; d.style.top = sp.y + '%'
    d.style.width = sp.s + 'px'; d.style.height = sp.s + 'px'
    d.style.background = sp.c; d.style.boxShadow = `0 0 ${sp.s + 4}px ${sp.c}`
    d.style.animation = `roomTwinkle ${sp.d}s steps(2, jump-none) ${sp.delay}s infinite`
    c.appendChild(d)
  }
  return c
}

// State A: mid-drag — room pushed right, gap+sparkles on the left, dimmed.
function showDrag(roomImg, px) {
  const stage = document.getElementById('stage')
  stage.innerHTML = ''
  const progress = Math.min(1, px / 390)
  const cont = document.createElement('div')
  cont.className = 'container'
  cont.style.transform = `translateX(${px}px)`
  const room = document.createElement('div')
  room.className = 'room'; room.style.backgroundImage = `url(${roomImg})`
  cont.appendChild(room)
  const veil = document.createElement('div')
  veil.className = 'veil'; veil.style.opacity = 0.5 * progress
  cont.appendChild(veil)
  cont.appendChild(curtainEl('left', { opacity: 0.25 + 0.75 * progress }))
  stage.appendChild(cont)
}

// State B: slide-in — incoming room enters from the right (slideDir 'left'),
// scaled+dimmed→full, sparkle curtain sweeps on its left edge.
function showSlide(roomImg, dir /* 'left'|'right' */) {
  const stage = document.getElementById('stage')
  stage.innerHTML = ''
  const enterFromRight = dir === 'left'
  const cont = document.createElement('div')
  cont.className = 'container'
  cont.style.animation = `slideIn${enterFromRight ? 'Right' : 'Left'} 0.45s cubic-bezier(0.32,0.72,0,1) both`
  const room = document.createElement('div')
  room.className = 'room'; room.style.backgroundImage = `url(${roomImg})`
  cont.appendChild(room)
  const veil = document.createElement('div')
  veil.className = 'veil'; veil.style.opacity = '0'
  veil.style.animation = 'roomArriveDim 0.45s ease-out both'
  cont.appendChild(veil)
  cont.appendChild(curtainEl(enterFromRight ? 'left' : 'right', { animation: 'roomCurtain 0.5s ease-out both' }))
  stage.appendChild(cont)
}
window.showDrag = showDrag
window.showSlide = showSlide
</script>
</body>
</html>
